services:
  - type: web
    name: mljresultscompiler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: ENABLE_TELEGRAM_BOT
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
